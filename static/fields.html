<!DOCTYPE html>
<html lang="pl" data-i18n-title="fields_page_title">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pola uprawne – Biomass Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="/static/admin-shared.css">
<script>if(localStorage.getItem('biomass_dark_mode')==='1')document.body.classList.add('dark-mode');</script>
<script src="/static/i18n.js"></script>
<style>
:root{
  --primary:#2563eb;--primary-light:#eff6ff;--primary-border:#bfdbfe;
  --success:#16a34a;--success-light:#f0fdf4;
  --warn:#d97706;--warn-light:#fffbeb;
  --danger:#dc2626;--danger-light:#fef2f2;
  --bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;
  --text:#1e293b;--text-muted:#64748b;--text-xs:#94a3b8;
  --border:#e2e8f0;--border-input:#cbd5e1;
  --radius:10px;--radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --topbar:var(--topbar-h);--panel:460px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden}

/* ── Topbar handled by admin-shared.css ── */

/* ── Layout ── */
.layout{display:flex;height:calc(100vh - var(--topbar));overflow:hidden}
.layout.list-first .panel{width:100%;min-width:100%}
.layout.list-first .map-wrap{display:none}

/* ── Panel ── */
.panel{
  width:var(--panel);min-width:var(--panel);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:calc(100vh - var(--topbar));
  overflow:hidden;z-index:200;
}
.panel-head{flex-shrink:0;padding:14px 16px 0}
.panel-scroll{flex:1;height:0;overflow-y:scroll;scrollbar-width:thin;scrollbar-color:var(--border-input) transparent}
.panel-scroll::-webkit-scrollbar{width:5px}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--border-input);border-radius:10px}

/* Stats bar */
.stats-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:0 16px 12px}
.stat{flex:1;text-align:center;padding:8px 4px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-size:17px;font-weight:700;color:var(--primary)}
.stat-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* Filters */
.filters{padding:0 16px 10px;display:flex;flex-direction:column;gap:8px}
.filter-row{display:flex;gap:6px}
.search-wrap{position:relative;flex:1}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-wrap input{width:100%;padding:7px 8px 7px 30px;border:1px solid var(--border-input);border-radius:8px;
  font-size:13px;background:var(--surface);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--primary)}
select.filter-sel{flex:1;padding:7px 8px;border:1px solid var(--border-input);border-radius:8px;
  font-size:13px;background:var(--surface);outline:none;cursor:pointer}
select.filter-sel:focus{border-color:var(--primary)}

.divider{height:1px;background:var(--border);margin:0 0 10px}
.list-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.6px;padding:0 16px 6px}
.list-pager{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  gap:8px;padding:8px 16px;border-top:1px solid var(--border);background:var(--surface);
}
.list-pager-info{font-size:11px;color:var(--text-muted)}
.list-pager-actions{display:flex;gap:6px}
.list-pager-btn{
  padding:5px 9px;border-radius:7px;border:1px solid var(--border-input);
  background:var(--surface2);color:var(--text-secondary);font-size:11px;font-weight:600;cursor:pointer
}
.list-pager-btn:disabled{opacity:.45;cursor:not-allowed}

/* Field list items */
.field-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background .12s;position:relative}
.field-item:hover{background:var(--surface2)}
.field-item.active{background:var(--primary-light)}
.field-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:1px}
.field-info{flex:1;min-width:0}
.field-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.field-sub{font-size:11.5px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.field-area{font-size:11.5px;font-weight:600;color:var(--text-muted);white-space:nowrap;flex-shrink:0}
.field-item-empty{padding:24px 16px;text-align:center;color:var(--text-muted);font-size:13px}

/* ── Detail view ── */
#view-detail{display:none;flex-direction:column;height:100%}
.detail-head{flex-shrink:0;padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px}
.detail-back{display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:7px;
  border:1px solid var(--border);background:none;cursor:pointer;font-size:12px;color:var(--text-muted);
  font-weight:500;transition:all .15s}
.detail-back:hover{background:var(--bg);color:var(--text)}
.detail-title{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-scroll{flex:1;height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:var(--border-input) transparent}
.detail-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.detail-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:var(--text-muted);margin-bottom:8px}
.detail-owner{display:flex;align-items:center;gap:10px}
.owner-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.owner-name{font-weight:600;font-size:13.5px}
.owner-email{font-size:11.5px;color:var(--text-muted);margin-top:2px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-kv{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.detail-kv-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.detail-kv-val{font-size:13.5px;font-weight:600;margin-top:3px;color:var(--text)}
.crop-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:12px;font-weight:600;background:#fef9c3;color:#854d0e;border:1px solid #fde68a}
.detail-actions{display:flex;gap:8px;padding:0 0 4px}
.detail-actions{flex-wrap:wrap}
.detail-actions .btn{flex:1;justify-content:center}
.detail-actions a.btn{text-decoration:none}
.detail-actions .btn-history{
  flex:1 0 100%;
  width:100%;
  min-height:30px;
  padding:6px 10px;
  font-size:12px;
  font-weight:600;
}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;transition:all .15s;border:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-ghost{background:none;border:1px solid var(--border-input);color:var(--text-muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-full{width:100%;justify-content:center}
.header-add-field{
  background:linear-gradient(135deg,var(--primary),#1d4ed8) !important;
  border-color:#1d4ed8 !important;
  color:#fff !important;
}
.header-add-field:hover{
  filter:brightness(1.05);
  transform:translateY(-1px);
}

/* ── Map ── */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* ── Legend ── */
.legend{position:absolute;bottom:24px;right:14px;z-index:400;
  background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 14px;box-shadow:var(--shadow-md);min-width:140px;max-width:220px}
.legend-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--text-muted);margin-bottom:7px}
.legend-note{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.legend-item{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:12px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
body.dark-mode .legend{
  background:rgba(15,23,42,.92);
  border-color:#334155;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}
body.dark-mode .legend-title{color:#cbd5e1}
body.dark-mode .legend-note{color:#94a3b8}
body.dark-mode .legend-item{color:#e2e8f0}

/* ── Loading ── */
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;z-index:500;gap:10px;font-weight:600}
.spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;
  font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--danger)}

.history-wrap{display:flex;flex-direction:column;gap:10px}
.history-meta{font-size:12px;color:var(--text-muted)}
.history-table-wrap{overflow:auto;border:1px solid var(--border);border-radius:8px;background:var(--surface)}
.history-table{width:100%;border-collapse:collapse;min-width:1700px}
.history-table th,.history-table td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:12px;text-align:left}
.history-table th{position:sticky;top:0;background:var(--surface2);z-index:1;color:var(--text-muted);font-weight:700}
.history-table tbody tr:last-child td{border-bottom:none}
.history-empty{font-size:12px;color:var(--text-muted);padding:8px 2px}
</style>
</head>
<body>

<!-- App Header -->
<header class="app-header">
  <div class="app-header-inner">
    <a href="/app" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0">
      <img src="/static/radscan_logo_color.jpg" class="app-logo" alt="Radscan">
    </a>
    <div>
      <div class="app-title">Biomass Explorer</div>
      <span class="app-subtitle" data-i18n="fields_tb_title">Pola uprawne</span>
    </div>
    <div class="app-header-sep"></div>
    <div class="app-header-nav">
      <a class="app-header-back" id="tb-back-link" href="/admin">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="tb-back-text" data-i18n="back">Admin</span>
      </a>
      <a class="app-header-back header-add-field" href="/field-editor">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span data-i18n="draw_field">Add field</span>
      </a>
    </div>
    <div class="app-header-spacer"></div>
    <span class="app-user-badge" id="tb-user">–</span>
    <span class="app-role-badge" id="tb-role" style="display:none"></span>
    <div class="app-lang-switch">
      <button class="app-lang-btn" data-lang="pl" onclick="applyLang('pl')" title="Polski">🇵🇱</button>
      <button class="app-lang-btn" data-lang="en" onclick="applyLang('en')" title="English">🇬🇧</button>
    </div>
    <button class="header-dark-btn" id="btn-dark-mode" onclick="toggleDarkMode()" title="Toggle dark mode">&#9789;</button>
    <button class="app-logout-btn" onclick="logout()" data-i18n="logout">Wyloguj</button>
  </div>
</header>

<div class="layout">
  <!-- ── Panel ── -->
  <aside class="panel">

    <!-- LIST VIEW -->
    <div id="view-list" style="display:flex;flex-direction:column;height:100%">
      <div class="panel-head">
        <!-- Stats -->
        <div class="stats-bar" id="stats-bar">
          <div class="stat"><div class="stat-val" id="stat-fields">–</div><div class="stat-lbl" data-i18n="stat_fields">Pola</div></div>
          <div class="stat"><div class="stat-val" id="stat-area">–</div><div class="stat-lbl" data-i18n="stat_area">Łącznie ha</div></div>
          <div class="stat"><div class="stat-val" id="stat-owners">–</div><div class="stat-lbl" data-i18n="stat_owners">Właściciele</div></div>
        </div>
        <!-- Filters -->
        <div class="filters">
          <div class="search-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="q-search" type="text" data-i18n-ph="ph_search_field" placeholder="Szukaj pola…" oninput="applyFilters()">
          </div>
          <div class="filter-row">
            <select class="filter-sel" id="q-owner" onchange="applyFilters()">
              <option value="" data-i18n="all_owners">— Wszyscy właściciele —</option>
            </select>
            <select class="filter-sel" id="q-crop" onchange="applyFilters()">
              <option value="" data-i18n="all_crops">— Wszystkie uprawy —</option>
            </select>
          </div>
        </div>
        <div class="divider"></div>
        <div class="list-label" id="list-label"><span id="list-count">0</span> <span data-i18n="stat_fields">pól</span></div>
      </div>
      <div class="panel-scroll" id="field-list"></div>
      <div class="list-pager" id="list-pager" style="display:none">
        <div class="list-pager-info" id="list-pager-info">1-10 / 10 (page 1/1)</div>
        <div class="list-pager-actions">
          <button type="button" class="list-pager-btn" id="list-pager-prev" onclick="changeListPage(-1)" data-i18n="pager_prev">Prev</button>
          <button type="button" class="list-pager-btn" id="list-pager-next" onclick="changeListPage(1)" data-i18n="pager_next">Next</button>
        </div>
      </div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="view-detail">
      <div class="detail-head">
        <button class="detail-back" onclick="showList()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span data-i18n="list_back">Lista</span>
        </button>
        <span class="detail-title" id="detail-title">–</span>
        <a id="detail-edit-btn" href="#" class="btn btn-primary" style="padding:6px 12px;font-size:12px;text-decoration:none">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span data-i18n="edit">Edytuj</span>
        </a>
      </div>
      <div class="detail-scroll" id="detail-body"></div>
    </div>
  </aside>

  <!-- ── Map ── -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="legend" id="legend" style="display:none">
      <div class="legend-title" data-i18n="legend_title">Właściciele</div>
      <div id="legend-items"></div>
    </div>
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div> <span data-i18n="loading_fields">Ładowanie pól…</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Auth ──────────────────────────────────────────────────────────────────
if (typeof bmSetupSessionGuard === 'function') {
  bmSetupSessionGuard({ logoutOnReload: false, timeoutMs: 30 * 60 * 1000 });
}
const token = localStorage.getItem('bm_token');
if (!token) { window.location.href = '/login'; }
const username = localStorage.getItem('bm_username') || '';
const fullname = localStorage.getItem('bm_fullname') || username;
let role       = (localStorage.getItem('bm_role') || 'user').toLowerCase();
document.getElementById('tb-user').textContent = fullname || username;
const roleEl = document.getElementById('tb-role');
const backLink = document.getElementById('tb-back-link');
const backText = document.getElementById('tb-back-text');
function logout() { ['bm_token','bm_role','bm_username','bm_fullname'].forEach(k => localStorage.removeItem(k)); window.location.href = '/login'; }

initLang();

function applyRoleUi() {
  const ownerSel = document.getElementById('q-owner');
  const cropSel = document.getElementById('q-crop');
  const legend = document.getElementById('legend');
  if (role === 'admin') {
    roleEl.textContent = 'admin';
    roleEl.style.display = '';
    if (backLink) backLink.href = '/admin';
    if (backText) backText.textContent = 'Admin';
    if (ownerSel) ownerSel.style.display = '';
    if (cropSel) cropSel.style.flex = '';
    if (legend) legend.style.display = '';
    setMapMode(true);
    return;
  }
  roleEl.style.display = 'none';
  if (backLink) {
    backLink.href = '/my-fields';
    backLink.style.display = '';
    backText.textContent = (typeof getCurrentLang === 'function' && getCurrentLang() === 'pl') ? 'Moje pola' : 'My Fields';
  }
  // User map view: same as admin view, but without owner selector.
  if (ownerSel) ownerSel.style.display = 'none';
  if (cropSel) cropSel.style.flex = '1';
  if (legend) legend.style.display = 'none';
  setMapMode(true);
}

function setMapMode(showMap) {
  mapModeVisible = !!showMap;
  const layout = document.querySelector('.layout');
  if (layout) layout.classList.toggle('list-first', !mapModeVisible);
  const toggleText = document.getElementById('map-toggle-text');
  if (toggleText) toggleText.textContent = mapModeVisible ? t('list_back') : t('view_on_map');
  if (mapModeVisible) {
    setTimeout(function() {
      if (map && typeof map.invalidateSize === 'function') map.invalidateSize();
      if (activeId != null) {
        const active = allFields.find(f => f.id === activeId);
        if (active) zoomToField(active);
      }
    }, 80);
  }
}

function toggleMapMode() {
  setMapMode(!mapModeVisible);
}

async function bootstrapAuth() {
  try {
    const res = await fetch('/auth/me', { headers: hdrs() });
    if (!res.ok) {
      logout();
      return;
    }
    const me = await res.json();
    role = (me.role || role || 'user').toLowerCase();
    localStorage.setItem('bm_role', role);
    applyRoleUi();
    loadData();
  } catch (_) {
    logout();
  }
}

// ── Map init ──────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([52.0, 19.5], 7);
const satellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&hl=en', {
  maxNativeZoom: 20, maxZoom: 22, attribution: '© Google'
}).addTo(map);
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxNativeZoom: 19, maxZoom: 22, attribution: '© OpenStreetMap'
});
L.control.layers({ 'Satellite (Google)': satellite, 'Street Map (OSM)': osm }, {}, { position: 'topright', collapsed: false }).addTo(map);

// ── Color palette ─────────────────────────────────────────────────────────
const PALETTE = [
  '#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6',
  '#06b6d4','#ec4899','#84cc16','#f97316','#64748b',
  '#14b8a6','#a855f7','#f43f5e','#eab308','#0ea5e9',
];
const ownerColorMap = {}; // owner_id → color hex
let ownerColorIdx = 0;
function ownerColor(oid) {
  if (oid == null) return '#94a3b8';
  if (!ownerColorMap[oid]) ownerColorMap[oid] = PALETTE[ownerColorIdx++ % PALETTE.length];
  return ownerColorMap[oid];
}
function ownerInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

// ── State ─────────────────────────────────────────────────────────────────
let allFields = [];
let filteredFields = [];
let layerMap = {};       // field_id → { polyLayer, pinLayer }
let activeId = null;
let ownersList = [];
let mapModeVisible = true;
let visibleFieldIds = new Set();
const DOT_LOW_ZOOM_MAX = 12;
let listPage = 1;
const LIST_PAGE_SIZE = 20;
const fieldHistoryCache = {};

// ── API helpers ───────────────────────────────────────────────────────────
const hdrs = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });

function escHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => el.className = 'toast', 3000);
}

// ── Load data ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [fieldsRes, ownersRes] = await Promise.all([
      fetch('/api/fields/browse', { headers: hdrs() }),
      fetch('/api/owners',        { headers: hdrs() }),
    ]);
    if (!fieldsRes.ok) throw new Error(await fieldsRes.text());
    allFields   = await fieldsRes.json();
    allFields   = await hydrateMissingGeometries(allFields);
    ownersList  = ownersRes.ok ? await ownersRes.json() : [];

    buildOwnerColors();
    populateFilters();
    renderMapLayers();
    updateStats(allFields);
    applyFilters();
    buildLegend();
  } catch (e) {
    toast(t('err_loading') + e.message, 'error');
    console.error(e);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

async function hydrateMissingGeometries(fields) {
  const missing = fields.filter(function(f) {
    return !f.geojson && f.id != null;
  });
  if (!missing.length) return fields;

  const enriched = await Promise.all(fields.map(async function(f) {
    if (f.geojson || f.id == null) return f;
    try {
      const res = await fetch('/api/fields/' + f.id, { headers: hdrs() });
      if (!res.ok) return f;
      const detail = await res.json();
      if (!detail || !detail.geojson) return f;
      const copy = Object.assign({}, f);
      copy.geojson = detail.geojson;
      if ((copy.area_ha == null || Number.isNaN(Number(copy.area_ha))) && detail.area_m2 != null) {
        copy.area_ha = Number(detail.area_m2) / 10000;
      }
      return copy;
    } catch (_) {
      return f;
    }
  }));

  return enriched;
}

function buildOwnerColors() {
  // Assign colors in consistent order (sorted by owner name)
  const sorted = [...ownersList].sort((a,b) => (a.name||'').localeCompare(b.name,'pl'));
  sorted.forEach(o => ownerColor(o.id));
  // Also assign for any owner_id found in fields but not in ownersList
  allFields.forEach(f => { if (f.owner_id) ownerColor(f.owner_id); });
}

// ── Filters ───────────────────────────────────────────────────────────────
function populateFilters() {
  const ownerSel = document.getElementById('q-owner');
  const cropSel  = document.getElementById('q-crop');
  const ownerPlaceholder = t('all_owners');
  const cropPlaceholder = t('all_crops');

  // Rebuild options each time from current role/data snapshot.
  ownerSel.innerHTML = '';
  cropSel.innerHTML = '';
  ownerSel.appendChild(new Option(ownerPlaceholder, ''));
  cropSel.appendChild(new Option(cropPlaceholder, ''));

  // Non-admin users already see only their own fields, so owner filter
  // should stay empty to avoid exposing global owner list.
  if (role !== 'admin') {
    ownerSel.disabled = true;
  } else {
    ownerSel.disabled = false;
    const owners = ownersList.length
      ? ownersList
      : [...new Map(allFields.filter(f=>f.owner_id).map(f=>[f.owner_id,{id:f.owner_id,name:f.owner_name}])).values()];
    owners.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id; opt.textContent = o.name || o.email || `#${o.id}`;
      ownerSel.appendChild(opt);
    });
  }

  const crops = [...new Set(allFields.map(f=>f.crop).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pl'));
  crops.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c; cropSel.appendChild(opt);
  });
}

function applyFilters() {
  const q      = document.getElementById('q-search').value.trim().toLowerCase();
  const ownId  = document.getElementById('q-owner').value;
  const cropQ  = document.getElementById('q-crop').value;

  filteredFields = allFields.filter(f => {
    if (q && !(f.name||'').toLowerCase().includes(q) && !(f.owner_name||'').toLowerCase().includes(q)) return false;
    if (ownId && String(f.owner_id) !== String(ownId)) return false;
    if (cropQ && f.crop !== cropQ) return false;
    return true;
  });

  listPage = 1;
  renderList(filteredFields);
  visibleFieldIds = new Set(filteredFields.map(f => f.id));
  updateMapVisibility(filteredFields);
  document.getElementById('list-count').textContent = filteredFields.length;
  buildLegend();
}

// ── Map layers ────────────────────────────────────────────────────────────
const polyGroup = L.featureGroup().addTo(map);
const pinGroup  = L.featureGroup().addTo(map);

function renderMapLayers() {
  polyGroup.clearLayers(); pinGroup.clearLayers(); layerMap = {};

  allFields.forEach(f => {
    const color = ownerColor(f.owner_id);
    const tooltipHtml = `<b>${f.name}</b><br>${f.owner_name||'–'} · ${f.crop||'–'}`;
    let polyLayer = null;
    let pinLayer = null;

    if (f.geojson) {
      polyLayer = L.geoJSON(f.geojson, {
        style: { fillColor: color, fillOpacity: 0.35, color, weight: 2, opacity: 0.85 }
      });
      polyLayer.on('mouseover', () => { if (activeId !== f.id) polyLayer.setStyle({ fillOpacity: 0.55, weight: 3 }); });
      polyLayer.on('mouseout',  () => { if (activeId !== f.id) polyLayer.setStyle({ fillOpacity: 0.35, weight: 2 }); });
      polyLayer.on('click', () => selectField(f.id));
      polyLayer.bindTooltip(tooltipHtml, { sticky: true });
      polyGroup.addLayer(polyLayer);
    }

    if (f.lat && f.lng) {
      pinLayer = L.circleMarker([f.lat, f.lng], {
        radius: f.geojson ? 5 : 7,
        fillColor: color,
        fillOpacity: 0.9,
        color: '#fff',
        weight: 2
      });
      pinLayer.on('click', () => selectField(f.id));
      pinLayer.bindTooltip(tooltipHtml, { sticky: true });
      pinGroup.addLayer(pinLayer);
    }

    if (!polyLayer && !pinLayer) return;
    layerMap[f.id] = { polyLayer, pinLayer };
  });

  if (polyGroup.getLayers().length > 0) map.fitBounds(polyGroup.getBounds(), { padding: [20, 20] });
  else if (pinGroup.getLayers().length > 0) map.fitBounds(pinGroup.getBounds(), { padding: [20, 20] });
  applyPinVisibility();
}

function shouldShowPin(entry) {
  if (!entry || !entry.pinLayer) return false;
  // Centroid-only fields keep dot always.
  if (!entry.polyLayer) return true;
  // For polygon fields: dots are only for localization at low zoom.
  return map.getZoom() <= DOT_LOW_ZOOM_MAX;
}

function applyPinVisibility() {
  Object.entries(layerMap).forEach(function(pair) {
    const id = Number(pair[0]);
    const entry = pair[1];
    const pin = entry ? entry.pinLayer : null;
    if (!pin) return;
    const visible = visibleFieldIds.has(id) && shouldShowPin(entry);
    if (visible) {
      if (!pinGroup.hasLayer(pin)) pinGroup.addLayer(pin);
    } else if (pinGroup.hasLayer(pin)) {
      pinGroup.removeLayer(pin);
    }
  });
}

function updateMapVisibility(visible) {
  const visIds = new Set(visible.map(f => f.id));
  Object.entries(layerMap).forEach(([id, layers]) => {
    const show = visIds.has(Number(id));
    const polyLayer = layers && layers.polyLayer ? layers.polyLayer : null;
    const pinLayer = layers && layers.pinLayer ? layers.pinLayer : null;
    if (show) {
      if (polyLayer && !polyGroup.hasLayer(polyLayer)) polyGroup.addLayer(polyLayer);
      if (pinLayer && !pinGroup.hasLayer(pinLayer)) pinGroup.addLayer(pinLayer);
    } else {
      if (polyLayer) polyGroup.removeLayer(polyLayer);
      if (pinLayer) pinGroup.removeLayer(pinLayer);
    }
  });
  applyPinVisibility();
}

function highlightLayer(id, on) {
  const layers = layerMap[id];
  if (!layers) return;
  const field = allFields.find(f => f.id === id);
  const color = ownerColor(field ? field.owner_id : null);
  if (layers.polyLayer && layers.polyLayer.setStyle) {
    layers.polyLayer.setStyle(on
      ? { fillOpacity: 0.65, weight: 3, color: '#fff' }
      : { fillOpacity: 0.35, weight: 2, color: color, fillColor: color, opacity: 0.85 }
    );
  }
  if (layers.pinLayer && layers.pinLayer.setStyle) {
    layers.pinLayer.setStyle(on
      ? { radius: 8, fillOpacity: 1, color: '#ffffff', weight: 2.5 }
      : { radius: field && field.geojson ? 5 : 7, fillOpacity: 0.9, color: '#ffffff', weight: 2 }
    );
  }
}

function zoomToField(f) {
  const layers = layerMap[f.id];
  if (!layers) return;
  if (layers.polyLayer && typeof layers.polyLayer.getBounds === 'function') {
    map.fitBounds(layers.polyLayer.getBounds(), { padding: [40, 40], maxZoom: 16 });
    return;
  }
  if (layers.pinLayer && f.lat && f.lng) {
    map.setView([f.lat, f.lng], 15);
  }
}

// ── Field list ────────────────────────────────────────────────────────────
function renderList(fields) {
  const el = document.getElementById('field-list');
  const total = fields.length;
  const totalPages = Math.max(1, Math.ceil(total / LIST_PAGE_SIZE));
  listPage = Math.max(1, Math.min(listPage, totalPages));
  const start = (listPage - 1) * LIST_PAGE_SIZE;
  const pageRows = fields.slice(start, start + LIST_PAGE_SIZE);
  if (!fields.length) {
    el.innerHTML = `<div class="field-item-empty">${t('no_results')}</div>`;
    renderListPager(0, 0, 0, 1, 1);
    return;
  }
  el.innerHTML = pageRows.map(f => {
    const color = ownerColor(f.owner_id);
    const area  = f.area_ha ? `${f.area_ha.toFixed(2)} ha` : '';
    const calcCount = Number.isFinite(Number(f.calc_count)) ? Number(f.calc_count) : 0;
    const historyLabel = (isPolishUi() ? 'Historia' : 'History') + ': ' + calcCount;
    const sub = [f.owner_name, f.crop, historyLabel].filter(Boolean).join(' · ');
    return `<div class="field-item${f.id===activeId?' active':''}" onclick="selectField(${f.id})" id="li-${f.id}">
      <div class="field-dot" style="background:${color}"></div>
      <div class="field-info">
        <div class="field-name">${escHtml(f.name)}</div>
        <div class="field-sub">${escHtml(sub||'–')}</div>
      </div>
      ${area ? `<div class="field-area">${area}</div>` : ''}
    </div>`;
  }).join('');
  renderListPager(start + 1, Math.min(start + LIST_PAGE_SIZE, total), total, listPage, totalPages);
}

function renderListPager(from, to, total, page, totalPages) {
  const wrap = document.getElementById('list-pager');
  const info = document.getElementById('list-pager-info');
  const prev = document.getElementById('list-pager-prev');
  const next = document.getElementById('list-pager-next');
  if (!wrap || !info || !prev || !next) return;
  if (total <= LIST_PAGE_SIZE) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'flex';
  info.textContent = t('pager_info', from, to, total, page, totalPages);
  prev.disabled = page <= 1;
  next.disabled = page >= totalPages;
}

function changeListPage(delta) {
  listPage = Math.max(1, listPage + delta);
  renderList(filteredFields);
}

function updateStats(fields) {
  const totalArea = fields.reduce((s, f) => s + (f.area_ha || 0), 0);
  const uniqOwners = new Set(fields.map(f => f.owner_id).filter(Boolean)).size;
  document.getElementById('stat-fields').textContent = fields.length;
  document.getElementById('stat-area').textContent = totalArea.toFixed(1);
  document.getElementById('stat-owners').textContent = uniqOwners;
}

// ── Select / Detail ───────────────────────────────────────────────────────
function selectField(id) {
  if (activeId && activeId !== id) highlightLayer(activeId, false);
  activeId = id;
  const f = allFields.find(f => f.id === id);
  if (!f) return;

  highlightLayer(id, true);
  zoomToField(f);

  // Mark active in list
  document.querySelectorAll('.field-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById(`li-${id}`);
  if (li) { li.classList.add('active'); li.scrollIntoView({ block: 'nearest' }); }

  showDetail(f);
  applyPinVisibility();
}

function _historyLabel(showing) {
  if (isPolishUi()) return showing ? 'Ukryj historię analiz' : 'Pokaż historię analiz';
  return showing ? 'Hide calculation history' : 'Show calculation history';
}

function _fmtHistNum(v) {
  const n = Number(v);
  return Number.isFinite(n) ? n.toFixed(4) : '—';
}

function _historySortKey(item) {
  const a = item && (item.captured_at || item.date);
  if (!a) return 0;
  const t = Date.parse(String(a));
  return Number.isFinite(t) ? t : 0;
}

function _renderHistoryTable(records) {
  if (!Array.isArray(records) || records.length === 0) {
    return `<div class="history-empty">${isPolishUi() ? 'Brak zapisanej historii dla tego pola.' : 'No saved history for this field.'}</div>`;
  }
  const rows = records.slice().sort((a, b) => _historySortKey(b) - _historySortKey(a));
  return `
    <div class="history-table-wrap">
      <table class="history-table">
        <thead>
          <tr>
            <th>${isPolishUi() ? 'Data' : 'Date'}</th>
            <th>${isPolishUi() ? 'Sensor' : 'Sensor'}</th>
            <th>NDVI</th>
            <th>NDRE</th>
            <th>GNDVI</th>
            <th>EVI</th>
            <th>SAVI</th>
            <th>CIre</th>
            <th>MTCI</th>
            <th>IRECI</th>
            <th>NDMI</th>
            <th>NMDI</th>
            <th>LST</th>
            <th>VSWI</th>
            <th>TVDI</th>
            <th>TCI</th>
            <th>VHI</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${escHtml(r.date || r.captured_at || '—')}</td>
              <td>${escHtml(r.sensor || '—')}</td>
              <td>${_fmtHistNum(r.ndvi)}</td>
              <td>${_fmtHistNum(r.ndre)}</td>
              <td>${_fmtHistNum(r.gndvi)}</td>
              <td>${_fmtHistNum(r.evi)}</td>
              <td>${_fmtHistNum(r.savi)}</td>
              <td>${_fmtHistNum(r.cire)}</td>

              <td>${_fmtHistNum(r.ireci)}</td>
              <td>${_fmtHistNum(r.ndmi)}</td>
              <td>${_fmtHistNum(r.nmdi)}</td>
              <td>${_fmtHistNum(r.lst)}</td>
              <td>${_fmtHistNum(r.vswi)}</td>
              <td>${_fmtHistNum(r.tvdi)}</td>
              <td>${_fmtHistNum(r.tci)}</td>
              <td>${_fmtHistNum(r.vhi)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function toggleFieldHistory(fieldId) {
  const panel = document.getElementById('detail-history-panel');
  const content = document.getElementById('detail-history-content');
  const btn = document.getElementById('detail-history-btn');
  const label = document.getElementById('detail-history-btn-label');
  if (!panel || !content || !btn || !label) return;

  const isOpen = panel.style.display !== 'none';
  if (isOpen) {
    panel.style.display = 'none';
    label.textContent = _historyLabel(false);
    return;
  }

  panel.style.display = '';
  label.textContent = _historyLabel(true);

  if (fieldHistoryCache[fieldId]) {
    content.innerHTML = _renderHistoryTable(fieldHistoryCache[fieldId]);
    return;
  }

  content.innerHTML = `<div class="history-empty">${isPolishUi() ? 'Ładowanie historii…' : 'Loading history…'}</div>`;
  try {
    const res = await fetch('/history/' + fieldId, { headers: hdrs() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const records = await res.json();
    fieldHistoryCache[fieldId] = Array.isArray(records) ? records : [];
    content.innerHTML = _renderHistoryTable(fieldHistoryCache[fieldId]);
  } catch (e) {
    content.innerHTML = `<div class="history-empty">${isPolishUi() ? 'Nie udało się pobrać historii.' : 'Failed to load history.'}</div>`;
  }
}

function showList() {
  if (activeId) highlightLayer(activeId, false);
  activeId = null;
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-list').style.display = 'flex';
  document.querySelectorAll('.field-item').forEach(el => el.classList.remove('active'));
  if (mapModeVisible && filteredFields.length) {
    const bounds = filteredFields
      .filter(f => layerMap[f.id])
      .map(f => layerMap[f.id])
      .filter(l => l.getBounds)
      .map(l => l.getBounds());
    if (bounds.length) {
      const combined = bounds.reduce((acc, b) => acc.extend(b));
      map.fitBounds(combined, { padding: [20, 20] });
    }
  }
  applyPinVisibility();
}

// ── Legend ────────────────────────────────────────────────────────────────
function buildLegend() {
  if (role !== 'admin') {
    document.getElementById('legend').style.display = 'none';
    return;
  }
  const source = (filteredFields && filteredFields.length) ? filteredFields : allFields;
  const byOwner = new Map();
  source.forEach(f => {
    if (!f.owner_id) return;
    const prev = byOwner.get(f.owner_id) || { id: f.owner_id, name: f.owner_name || '', count: 0 };
    prev.count += 1;
    if (!prev.name && f.owner_name) prev.name = f.owner_name;
    byOwner.set(f.owner_id, prev);
  });

  const owners = Array.from(byOwner.values()).map(o => {
    const full = (ownersList.find(x => x.id === o.id) || {});
    return {
      id: o.id,
      name: o.name || full.name || full.email || ('#' + o.id),
      count: o.count,
    };
  }).sort((a, b) => (b.count - a.count) || String(a.name).localeCompare(String(b.name), 'pl'));

  const el = document.getElementById('legend-items');
  const LIMIT = 10;
  const topOwners = owners.slice(0, LIMIT);
  const restOwners = owners.slice(LIMIT);
  const restFieldsCount = restOwners.reduce((s, o) => s + (o.count || 0), 0);

  let html = '';
  if (owners.length > LIMIT) {
    html += `<div class="legend-note">${t('legend_top_n', LIMIT, owners.length)}</div>`;
  }

  html += topOwners.map(o => {
    const col = ownerColor(o.id);
    const lbl = `${o.name} (${o.count})`;
    return `<div class="legend-item" title="${escHtml(lbl)}">
      <div class="legend-dot" style="background:${col}"></div>
      <span>${escHtml(lbl)}</span>
    </div>`;
  }).join('');

  if (restFieldsCount > 0) {
    html += `<div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div><span>${t('legend_others', restOwners.length, restFieldsCount)}</span></div>`;
  }

  // Unassigned
  const noOwner = source.filter(f => !f.owner_id);
  if (noOwner.length) {
    html += `<div class="legend-item"><div class="legend-dot" style="background:#64748b"></div><span>${t('no_owner', noOwner.length)}</span></div>`;
  }
  el.innerHTML = html;
  document.getElementById('legend').style.display = html ? '' : 'none';
}

// ── Helpers ───────────────────────────────────────────────────────────────
function formatDate(s) {
  if (!s) return '–';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('pl-PL', { day:'2-digit', month:'short', year:'numeric' });
}

function isPolishUi() {
  if (typeof getCurrentLang === 'function') {
    return getCurrentLang() === 'pl';
  }
  return (document.documentElement.lang || 'pl') === 'pl';
}

// ── Lang change ───────────────────────────────────────────────────────────
window.addEventListener('langchange', () => {
  // Re-render dynamic content
  if (allFields.length) {
    renderList(filteredFields);
    buildLegend();
    if (activeId !== null) {
      const f = allFields.find(f => f.id === activeId);
      if (f) showDetail(f);
    }
  }
  // Update filter first options
  const ownerSel = document.getElementById('q-owner');
  const cropSel  = document.getElementById('q-crop');
  if (ownerSel.options[0]) ownerSel.options[0].textContent = t('all_owners');
  if (cropSel.options[0])  cropSel.options[0].textContent  = t('all_crops');
  if (role !== 'admin' && backText) {
    backText.textContent = (typeof getCurrentLang === 'function' && getCurrentLang() === 'pl') ? 'Moje pola' : 'My Fields';
  }
  const toggleText = document.getElementById('map-toggle-text');
  if (toggleText) toggleText.textContent = mapModeVisible ? t('list_back') : t('view_on_map');
});

map.on('zoomend', applyPinVisibility);

// ── Init ──────────────────────────────────────────────────────────────────
bootstrapAuth();
</script>
